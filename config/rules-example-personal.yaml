rules:
  - id: retail-return-confirmations
    match: >-
      Retail return confirmations, dropoff confirmations, and return request confirmations are low priority. Only keep
      in inbox if something went wrong, such as a lost return, a deadline, or a required follow-up.
    archive: true
    source: example
  - id: account-statements
    match: >-
      Routine account statements, tax documents, and monthly summaries from financial services. Keep in inbox only if
      the email mentions failed delivery, fraud, an urgent deadline, or required action.
    archive: true
    source: example
  - id: routine-login-alerts
    match: >-
      New login or sign-in alerts from services you use, unless the login is from an unusual location, unknown device,
      or unfamiliar browser.
    archive: true
    source: example
  - id: card-transaction-notifications
    match: >-
      Routine card transaction notifications. Keep in inbox only if the message mentions low balance, insufficient
      funds, fraud, or account issues.
    archive: true
    source: example
  - id: neighborhood-digests
    match: Neighborhood digest emails, popular post notifications, and community roundups.
    archive: true
    source: example
  - id: refund-confirmations
    match: >-
      Refund confirmation and refund processed notifications. Only keep in inbox if the refund failed, was denied, or
      the amount looks wrong.
    archive: true
    source: example
  - id: school-checkins
    match: >-
      School or childcare check-in/check-out notifications are ephemeral. Post a short FYI if feed notifications are
      enabled, then archive.
    archive: true
    source: example
  - id: order-updates
    match: >-
      Routine order confirmations, shipping updates, and delivery notifications. Keep in inbox if there is a failed
      delivery, damaged shipment, payment issue, or action required.
    archive: true
    source: example
  - id: credit-monitoring-updates
    match: >-
      Credit monitoring notifications and score updates unless they mention fraud, identity theft, unauthorized
      accounts, or a required dispute.
    archive: true
    source: example
  - id: real-person-known-partners
    match: >-
      Emails from known collaborators, vendors, or partners that appear written by a real person should be kept in
      inbox.
    archive: false
    source: example
  - id: newsletters
    match: Newsletters, product updates, and educational content that are not tied to a current project or deadline.
    archive: true
    source: example
  - id: patient-portal-messages
    match: >-
      Patient portal messages from doctors, providers, or care teams should not be archived. Only archive generic
      marketing, surveys, or system notifications.
    archive: false
    source: example
